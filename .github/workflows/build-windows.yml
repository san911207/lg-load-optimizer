name: Build Windows .exe → Release → Email

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file exe
        run: pyinstaller app.spec --clean --noconfirm

      - name: Upload artifact (30-day fallback)
        uses: actions/upload-artifact@v4
        with:
          name: LG_Load_Optimizer_Windows
          path: dist/LG_Load_Optimizer.exe
          if-no-files-found: error

      - name: Create GitHub Release with .exe attached
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Windows build #${{ github.run_number }}
          body: |
            Auto build from commit ${{ github.sha }}.
            Download `LG_Load_Optimizer.exe` from the **Assets** below.
          files: dist/LG_Load_Optimizer.exe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Email download link to LG inbox
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: ${{ secrets.NOTIFY_FROM }}
          to: ${{ secrets.NOTIFY_TO }}
          subject: "LG Load Optimizer — Windows .exe build #${{ github.run_number }}"
          html_body: |
            <p>안녕하세요,</p>
            <p>LG Load Optimizer Windows .exe 새 빌드가 준비됐습니다.</p>

            <p><b>다운로드 (로그인 불필요 — 공개 repo):</b><br>
            <a href="https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_number }}/LG_Load_Optimizer.exe">
              https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_number }}/LG_Load_Optimizer.exe
            </a></p>

            <h3>사용법</h3>
            <ol>
              <li>위 링크 클릭 → .exe 다운로드</li>
              <li>Windows PC에서 더블클릭 → 콘솔 창에 self-diagnostic 표시</li>
              <li>10~30초 cold start 대기 — 브라우저가 localhost:8501 자동 오픈</li>
              <li>SmartScreen 경고 시: <em>More info</em> → <em>Run anyway</em></li>
              <li>인쇄: 대시보드에서 <b>Cmd+P</b> (Mac) / <b>Ctrl+P</b> (Win) → "PDF로 저장" 또는 프린터로 출력</li>
              <li>벌크 인쇄: Step 2 탭 위 "Print mode" 라디오에서 <em>All loads</em> 선택 → Cmd+P</li>
            </ol>

            <h3>변경 사항 (build #${{ github.run_number }})</h3>
            <ul>
              <li>📎 사이드바 Loads 업로드 영속성 fix — 페이지 이동 후에도 유지</li>
              <li>🎨 5-stage 카드 → N-stage 적응형 (카테고리 개수에 따라 자동)</li>
              <li>🖨 PDF 폐기 → HTML 인쇄 (Cmd+P · Plotly 3D 그대로) + 벌크 모드</li>
              <li>📦 .exe 크기 ~4MB 감소 (ReportLab 제거)</li>
            </ul>

            <p>Commit: <code>${{ github.sha }}</code></p>
            <p>Build #: ${{ github.run_number }}</p>
