# =============================================================================
# LG Load Optimizer - Local development compose
# =============================================================================
# Phase 0: just the Streamlit app
# Phase 1: add postgres + nginx + auth proxy

version: '3.9'

services:

  app:
    build: .
    container_name: load-optimizer-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    environment:
      - ENV=development
      - LOG_LEVEL=DEBUG
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

